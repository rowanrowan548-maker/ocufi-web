<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <radialGradient id="g1" cx="20%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#19FB9B" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#19FB9B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="85%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#60A5FA" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1500" height="500" fill="#0A0B0D"/>
  <rect width="1500" height="500" fill="url(#g1)"/>
  <rect width="1500" height="500" fill="url(#g2)"/>

  <!-- Logo -->
  <g transform="translate(110, 175)">
    <g transform="translate(0, 30)">
      <rect x="4" y="4" width="48" height="48" rx="12"
            transform="rotate(45 28 28)" stroke="#19FB9B" stroke-width="4" fill="none"/>
      <circle cx="28" cy="28" r="6.5" fill="#19FB9B"/>
    </g>
    <text x="80" y="60" font-family="-apple-system, system-ui, sans-serif"
          font-size="64" font-weight="700" fill="#FAFAFA"
          letter-spacing="-2">Ocufi</text>
  </g>

  <!-- Tagline -->
  <text x="110" y="320" font-family="-apple-system, system-ui, sans-serif"
        font-size="44" font-weight="700" fill="#FAFAFA" letter-spacing="-1">
    链上交易,应该回到你手里
  </text>
  <text x="110" y="370" font-family="-apple-system, system-ui, sans-serif"
        font-size="22" fill="#8B8D94">
    更低的手续费 · 更透明的价格 · 更少的中间人
  </text>

  <!-- Footer hint -->
  <g transform="translate(110, 410)">
    <circle cx="6" cy="6" r="6" fill="#19FB9B"/>
    <text x="22" y="11" font-family="-apple-system, system-ui, sans-serif"
          font-size="18" fill="#8B8D94">Solana · 非托管 · 开源 · ocufi.io</text>
  </g>
