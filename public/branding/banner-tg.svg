<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" aria-label="Ocufi Telegram Banner">
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#19FB9B" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#19FB9B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="640" fill="#0A0B0D"/>
  <rect width="1280" height="640" fill="url(#g1)"/>

  <!-- 微网格 -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Arc O logo · 居中上方 · 半径 90 -->
  <g transform="translate(640, 240)">
    <path d="M 0 -90 A 90 90 0 0 1 90 0" stroke="#19FB9B" stroke-width="22" fill="none" stroke-linecap="round"/>
    <path d="M 0 90 A 90 90 0 0 1 -90 0" stroke="#19FB9B" stroke-width="22" fill="none" stroke-linecap="round"/>
    <path d="M 90 0 A 90 90 0 0 1 0 90" stroke="#19FB9B" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.3"/>
    <path d="M -90 0 A 90 90 0 0 1 0 -90" stroke="#19FB9B" stroke-width="22" fill="none" stroke-linecap="round" opacity="0.3"/>
    <circle cx="0" cy="0" r="18" fill="#19FB9B"/>
  </g>

  <!-- Ocufi 字标 居中 -->
  <text x="640" y="430" text-anchor="middle"
        font-family="-apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif"
        font-size="120" font-weight="800" letter-spacing="-3" fill="#FAFAFA">Ocufi</text>

  <!-- tagline -->
  <text x="640" y="490" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', monospace"
        font-size="28" fill="#19FB9B" letter-spacing="1">Solana · Non-custodial · 0.1% fee</text>

  <text x="640" y="535" text-anchor="middle"
        font-family="-apple-system, 'Segoe UI', sans-serif"
        font-size="22" fill="#a1a1aa">Built for traders who do the math</text>

  <text x="640" y="595" text-anchor="middle"
        font-family="ui-monospace, 'SF Mono', monospace"
        font-size="22" font-weight="700" fill="#19FB9B">ocufi.io</text>
</svg>
