<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500" aria-label="Ocufi Twitter Banner">
  <defs>
    <radialGradient id="g1" cx="20%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#19FB9B" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#19FB9B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="100%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#19FB9B" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="1500" height="500" fill="#0A0B0D"/>
  <rect width="1500" height="500" fill="url(#g1)"/>
  <rect width="1500" height="500" fill="url(#g2)"/>

  <!-- 微网格背景 -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="1">
    <line x1="0" y1="125" x2="1500" y2="125"/>
    <line x1="0" y1="250" x2="1500" y2="250"/>
    <line x1="0" y1="375" x2="1500" y2="375"/>
    <line x1="375" y1="0" x2="375" y2="500"/>
    <line x1="750" y1="0" x2="750" y2="500"/>
    <line x1="1125" y1="0" x2="1125" y2="500"/>
  </g>

  <!-- Arc O logo · 左 · 半径 70 -->
  <g transform="translate(140, 250)">
    <path d="M 0 -70 A 70 70 0 0 1 70 0" stroke="#19FB9B" stroke-width="18" fill="none" stroke-linecap="round"/>
    <path d="M 0 70 A 70 70 0 0 1 -70 0" stroke="#19FB9B" stroke-width="18" fill="none" stroke-linecap="round"/>
    <path d="M 70 0 A 70 70 0 0 1 0 70" stroke="#19FB9B" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.3"/>
    <path d="M -70 0 A 70 70 0 0 1 0 -70" stroke="#19FB9B" stroke-width="18" fill="none" stroke-linecap="round" opacity="0.3"/>
    <circle cx="0" cy="0" r="14" fill="#19FB9B"/>
  </g>

  <!-- Wordmark + tagline -->
  <text x="270" y="232"
        font-family="-apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif"
        font-size="120" font-weight="800" letter-spacing="-3" fill="#FAFAFA">Ocufi</text>

  <text x="272" y="290"
        font-family="ui-monospace, 'SF Mono', monospace"
        font-size="26" fill="#19FB9B" letter-spacing="1">Solana · Non-custodial · 0.1% fee</text>

  <text x="272" y="332"
        font-family="-apple-system, 'Segoe UI', sans-serif"
        font-size="22" fill="#a1a1aa">链上交易,应该回到你手里 · Built for traders who do the math</text>

  <!-- 右下角 ocufi.io 链接 -->
  <text x="1440" y="455" text-anchor="end"
        font-family="ui-monospace, 'SF Mono', monospace"
        font-size="22" font-weight="700" fill="#19FB9B">ocufi.io</text>
</svg>
