<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" aria-label="Ocufi · Gradient Diamond">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1FFFA3"/>
      <stop offset="100%" stop-color="#0FCC78"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#19FB9B" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#19FB9B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="#0A0B0D"/>
  <!-- 中心光晕 -->
  <circle cx="16" cy="16" r="11" fill="url(#glow)"/>
  <!-- 渐变菱形 -->
  <rect x="4" y="4" width="24" height="24" rx="6" transform="rotate(45 16 16)"
        stroke="url(#g)" stroke-width="2.5" fill="none"/>
  <!-- 中心点 渐变 -->
  <circle cx="16" cy="16" r="3.5" fill="url(#g)"/>
</svg>
