<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" aria-label="Ocufi · Diamond Ripple">
  <rect width="32" height="32" rx="6" fill="#0A0B0D"/>
  <!-- 45° 菱形外框(同当前 logo) -->
  <rect x="4" y="4" width="24" height="24" rx="6" transform="rotate(45 16 16)"
        stroke="#19FB9B" stroke-width="2.5" fill="none"/>
  <!-- 中心瞳孔 + 同心淡环(强化"眼"隐喻) -->
  <circle cx="16" cy="16" r="5.5" stroke="#19FB9B" stroke-width="1" fill="none" opacity="0.35"/>
  <circle cx="16" cy="16" r="2.5" fill="#19FB9B"/>
</svg>
